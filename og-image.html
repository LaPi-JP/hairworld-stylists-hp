<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OG Image Generator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #f0f0f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      font-family: 'Segoe UI', sans-serif;
    }

    /* OG画像本体 (1200x630px) */
    .og-card {
      width: 1200px;
      height: 630px;
      position: relative;
      overflow: hidden;
      background: #1a1510;
    }

    /* 背景のゴールドグラデーション装飾 */
    .og-bg-pattern {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(212,168,83,0.15) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 30%, rgba(184,146,46,0.1) 0%, transparent 50%),
        radial-gradient(ellipse at 60% 80%, rgba(212,168,83,0.08) 0%, transparent 40%),
        linear-gradient(135deg, #1a1510 0%, #2c2418 40%, #1a1510 100%);
    }

    /* 上下のゴールドライン */
    .og-line-top {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 4px;
      background: linear-gradient(90deg, transparent, #d4a853, transparent);
    }
    .og-line-bottom {
      position: absolute;
      bottom: 0; left: 0;
      width: 100%; height: 4px;
      background: linear-gradient(90deg, transparent, #d4a853, transparent);
    }

    /* 左側のゴールドアクセントバー */
    .og-accent-left {
      position: absolute;
      top: 60px; left: 0;
      width: 6px; height: 200px;
      background: linear-gradient(180deg, transparent, #d4a853, transparent);
    }

    /* 右側の装飾円 */
    .og-deco-circle {
      position: absolute;
      right: -80px; top: -80px;
      width: 300px; height: 300px;
      border: 1px solid rgba(212,168,83,0.12);
      border-radius: 50%;
    }
    .og-deco-circle-2 {
      position: absolute;
      right: -40px; bottom: -100px;
      width: 400px; height: 400px;
      border: 1px solid rgba(212,168,83,0.08);
      border-radius: 50%;
    }

    /* コンテンツ */
    .og-content {
      position: relative;
      z-index: 1;
      width: 100%; height: 100%;
      display: flex;
      align-items: center;
      padding: 60px 80px;
      gap: 60px;
    }

    /* 左側：ロゴ */
    .og-logo-area {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .og-logo-area img {
      width: 180px;
      height: 180px;
      object-fit: contain;
    }
    /* ロゴ下の装飾ライン */
    .og-logo-line {
      width: 80px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #d4a853, transparent);
    }

    /* 右側：テキスト */
    .og-text-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .og-salon-name {
      font-family: 'Playfair Display', 'Georgia', serif;
      font-size: 56px;
      font-weight: 700;
      color: #d4a853;
      letter-spacing: 2px;
      margin-bottom: 8px;
      line-height: 1.1;
    }
    .og-salon-sub {
      font-size: 18px;
      color: rgba(212,168,83,0.6);
      letter-spacing: 6px;
      text-transform: uppercase;
      margin-bottom: 32px;
    }
    .og-divider {
      width: 60px;
      height: 2px;
      background: #d4a853;
      margin-bottom: 28px;
    }
    .og-services {
      display: flex;
      gap: 24px;
      margin-bottom: 28px;
    }
    .og-service-tag {
      font-size: 16px;
      color: rgba(255,255,255,0.7);
      padding: 6px 20px;
      border: 1px solid rgba(212,168,83,0.3);
      border-radius: 24px;
      letter-spacing: 1px;
    }
    .og-info-line {
      font-size: 16px;
      color: rgba(255,255,255,0.5);
      line-height: 1.8;
    }
    .og-info-line strong {
      color: rgba(212,168,83,0.8);
    }
    .og-tagline {
      font-size: 20px;
      color: rgba(255,255,255,0.85);
      margin-bottom: 20px;
      font-style: italic;
    }

    /* ボタン */
    .btn-group {
      margin-top: 30px;
      display: flex;
      gap: 12px;
    }
    .dl-btn {
      padding: 14px 28px;
      background: linear-gradient(135deg, #d4a853, #b8922e);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(212,168,83,0.4);
    }
    .dl-btn:hover { opacity: 0.9; }
    .dl-btn:disabled { opacity: 0.6; cursor: wait; }
    .info-text {
      margin-top: 12px;
      color: #888;
      font-size: 13px;
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- OG画像 (1200x630) -->
  <div class="og-card" id="ogCard">
    <!-- 背景装飾 -->
    <div class="og-bg-pattern"></div>
    <div class="og-line-top"></div>
    <div class="og-line-bottom"></div>
    <div class="og-accent-left"></div>
    <div class="og-deco-circle"></div>
    <div class="og-deco-circle-2"></div>

    <!-- コンテンツ -->
    <div class="og-content">
      <!-- ロゴ -->
      <div class="og-logo-area">
        <img src="logo (Gold).png" alt="Hairworld Stylists">
        <div class="og-logo-line"></div>
      </div>

      <!-- テキスト -->
      <div class="og-text-area">
        <div class="og-salon-name">Hairworld<br>Stylists</div>
        <div class="og-salon-sub">Hair & Makeup Salon</div>
        <div class="og-divider"></div>
        <div class="og-tagline">ร้านทำผมที่คุณไว้วางใจ ย่านพระราม 2</div>
        <div class="og-services">
          <span class="og-service-tag">Hair</span>
          <span class="og-service-tag">Makeup</span>
          <span class="og-service-tag">Nail</span>
        </div>
        <div class="og-info-line">
          <strong>📍</strong> Rama 2 Soi 50, Bang Khun Thian, Bangkok<br>
          <strong>🕐</strong> Open Daily 10:00 - 21:00 &nbsp; <strong>📞</strong> 063-961-2999
        </div>
      </div>
    </div>
  </div>

  <!-- ダウンロードボタン -->
  <div class="btn-group">
    <button class="dl-btn" id="dlBtn" onclick="downloadOG()">📥 Download OG Image (PNG)</button>
  </div>
  <p class="info-text">1200 x 630px — Facebook / LINE / Twitter 共有用</p>

  <!-- html2canvas -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script>
    async function downloadOG() {
      const btn = document.getElementById('dlBtn');
      btn.textContent = '⏳ Generating...';
      btn.disabled = true;

      try {
        const card = document.getElementById('ogCard');
        const canvas = await html2canvas(card, {
          scale: 2,
          backgroundColor: '#1a1510',
          logging: false,
          width: 1200,
          height: 630
        });

        const link = document.createElement('a');
        link.download = 'og-image.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
      } catch (e) {
        alert('Error: ' + e.message);
      }

      btn.textContent = '📥 Download OG Image (PNG)';
      btn.disabled = false;
    }
  </script>

</body>
</html>
