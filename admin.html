<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hairworld Stylists - Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', 'Noto Sans JP', sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
    }

    /* ログイン画面 */
    .login-screen {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .login-box {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 40px;
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    .login-box h1 {
      color: #d4a853;
      font-size: 20px;
      margin-bottom: 8px;
    }
    .login-box p {
      color: #888;
      font-size: 14px;
      margin-bottom: 24px;
    }
    .login-box input {
      width: 100%;
      padding: 12px 16px;
      background: #0a0a0a;
      border: 1px solid #333;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      margin-bottom: 16px;
    }
    .login-box button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #d4a853, #c9a84c);
      border: none;
      border-radius: 8px;
      color: #000;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
    }
    .login-box button:hover { opacity: 0.9; }
    .login-error {
      color: #ff6b6b;
      font-size: 13px;
      margin-top: 12px;
      display: none;
    }

    /* ダッシュボード */
    .dashboard { display: none; padding: 20px; max-width: 1200px; margin: 0 auto; }
    .dashboard.active { display: block; }
    .login-screen.hidden { display: none; }

    .header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .header-bar h1 {
      color: #d4a853;
      font-size: 22px;
    }
    .header-bar .stats {
      display: flex;
      gap: 20px;
    }
    .stat-card {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 12px 20px;
      text-align: center;
    }
    .stat-number {
      font-size: 28px;
      font-weight: 700;
      color: #d4a853;
    }
    .stat-label {
      font-size: 12px;
      color: #888;
      margin-top: 4px;
    }
    .logout-btn {
      background: none;
      border: 1px solid #555;
      color: #888;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }
    .logout-btn:hover { border-color: #ff6b6b; color: #ff6b6b; }

    /* 言語切替ボタン */
    .lang-switch {
      display: flex;
      gap: 6px;
    }
    .lang-switch button {
      padding: 6px 14px;
      background: none;
      border: 1px solid #555;
      color: #888;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
    }
    .lang-switch button.active {
      border-color: #d4a853;
      color: #d4a853;
      background: rgba(212, 168, 83, 0.1);
    }

    /* アクションバー */
    .action-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .action-bar button {
      padding: 10px 20px;
      background: #1a1a1a;
      border: 1px solid #d4a853;
      color: #d4a853;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
    }
    .action-bar button:hover { background: #d4a853; color: #000; }

    /* テーブル */
    .table-container {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 12px;
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 800px;
    }
    th {
      background: #222;
      color: #d4a853;
      padding: 14px 16px;
      text-align: left;
      font-size: 13px;
      font-weight: 600;
      border-bottom: 1px solid #333;
    }
    td {
      padding: 12px 16px;
      border-bottom: 1px solid #222;
      font-size: 13px;
      vertical-align: middle;
    }
    tr:hover { background: #222; }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #d4a853;
    }
    .avatar-placeholder {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #888;
      font-size: 14px;
    }
    .coupon-code {
      background: #2a2a1a;
      color: #d4a853;
      padding: 4px 8px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 12px;
    }
    .coupon-valid { color: #4ecdc4; }
    .coupon-expired { color: #ff6b6b; }
    .coupon-upcoming { color: #ffd93d; }

    .send-btn {
      padding: 6px 12px;
      background: none;
      border: 1px solid #4ecdc4;
      color: #4ecdc4;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
    }
    .send-btn:hover { background: #4ecdc4; color: #000; }

    /* 一斉送信モーダル */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.7);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 30px;
      max-width: 500px;
      width: 90%;
    }
    .modal h2 {
      color: #d4a853;
      font-size: 18px;
      margin-bottom: 8px;
    }
    .modal p {
      color: #888;
      font-size: 13px;
      margin-bottom: 16px;
    }
    .modal textarea {
      width: 100%;
      height: 120px;
      background: #0a0a0a;
      border: 1px solid #333;
      border-radius: 8px;
      color: #fff;
      padding: 12px;
      font-size: 14px;
      resize: vertical;
      margin-bottom: 16px;
    }
    .modal-actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }
    .modal-actions button {
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 13px;
    }
    .btn-cancel { background: #333; color: #fff; }
    .btn-send { background: #d4a853; color: #000; font-weight: 600; }
    .btn-send:hover { opacity: 0.9; }

    /* 検索バー */
    .search-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .search-bar input {
      flex: 1;
      padding: 10px 16px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
    }
    .search-bar input::placeholder { color: #666; }
    .search-bar input:focus { border-color: #d4a853; outline: none; }

    /* お客様カルテモーダル */
    .customer-detail {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      z-index: 1001;
      overflow-y: auto;
      padding: 20px;
    }
    .customer-detail.active { display: block; }
    .detail-container {
      max-width: 800px;
      margin: 0 auto;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 30px;
    }
    .detail-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .detail-avatar {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #d4a853;
    }
    .detail-info h2 { color: #d4a853; font-size: 20px; }
    .detail-info p { color: #888; font-size: 13px; margin-top: 4px; }
    .detail-close {
      margin-left: auto;
      background: none;
      border: 1px solid #555;
      color: #888;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }
    .detail-close:hover { border-color: #ff6b6b; color: #ff6b6b; }

    /* カルテ追加フォーム */
    .note-form {
      background: #222;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 24px;
    }
    .note-form h3 { color: #d4a853; font-size: 15px; margin-bottom: 16px; }
    .form-row {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .form-group {
      flex: 1;
      min-width: 150px;
    }
    .form-group label {
      display: block;
      color: #888;
      font-size: 12px;
      margin-bottom: 4px;
    }
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 8px 12px;
      background: #0a0a0a;
      border: 1px solid #333;
      border-radius: 6px;
      color: #fff;
      font-size: 13px;
    }
    .form-group textarea { height: 80px; resize: vertical; }
    .photo-upload {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    .photo-upload label {
      padding: 8px 16px;
      background: #333;
      border-radius: 6px;
      color: #d4a853;
      cursor: pointer;
      font-size: 13px;
    }
    .photo-upload label:hover { background: #444; }
    .photo-preview {
      width: 60px;
      height: 60px;
      border-radius: 6px;
      object-fit: cover;
      display: none;
    }
    .btn-add-note {
      padding: 10px 24px;
      background: #d4a853;
      border: none;
      border-radius: 8px;
      color: #000;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
    }
    .btn-add-note:hover { opacity: 0.9; }

    /* 施術履歴一覧 */
    .notes-list h3 { color: #d4a853; font-size: 15px; margin-bottom: 16px; }
    .note-card {
      background: #222;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .note-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .note-date { color: #d4a853; font-size: 13px; font-weight: 600; }
    .note-stylist {
      background: rgba(212,168,83,0.15);
      color: #d4a853;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 12px;
    }
    .note-service { color: #4ecdc4; font-size: 13px; margin-bottom: 6px; }
    .note-text { color: #ccc; font-size: 13px; line-height: 1.6; }
    .note-photo {
      width: 120px;
      height: 120px;
      border-radius: 8px;
      object-fit: cover;
      margin-top: 10px;
      cursor: pointer;
    }
    .note-photo:hover { opacity: 0.8; }
    .note-delete {
      background: none;
      border: none;
      color: #666;
      cursor: pointer;
      font-size: 12px;
    }
    .note-delete:hover { color: #ff6b6b; }
    .note-empty { color: #666; text-align: center; padding: 20px; }

    /* チェックボックス */
    .friend-checkbox {
      width: 18px;
      height: 18px;
      accent-color: #d4a853;
      cursor: pointer;
    }
    tr.selected { background: rgba(212, 168, 83, 0.08); }

    .loading { text-align: center; padding: 40px; color: #888; }
    .empty-state { text-align: center; padding: 40px; color: #666; }

    @media (max-width: 768px) {
      .header-bar { flex-direction: column; align-items: flex-start; }
      .header-bar .stats { width: 100%; }
      .stat-card { flex: 1; }
    }
  </style>
</head>
<body>

  <!-- ログイン画面 -->
  <div class="login-screen" id="loginScreen">
    <div class="login-box">
      <div class="lang-switch" style="justify-content:center;margin-bottom:16px;">
        <button class="active" onclick="setAdminLang('en')">EN</button>
        <button onclick="setAdminLang('th')">TH</button>
      </div>
      <h1>Hairworld Stylists</h1>
      <p data-admin-i18n="login.subtitle">Admin Dashboard</p>
      <input type="password" id="passwordInput" data-admin-i18n-placeholder="login.placeholder" placeholder="Enter admin password" onkeydown="if(event.key==='Enter')login()">
      <button onclick="login()" data-admin-i18n="login.button">Login</button>
      <p class="login-error" id="loginError" data-admin-i18n="login.error">Invalid password</p>
    </div>
  </div>

  <!-- ダッシュボード -->
  <div class="dashboard" id="dashboard">
    <div class="header-bar">
      <h1 data-admin-i18n="dashboard.title">LINE Friends Dashboard</h1>
      <div class="stats">
        <div class="stat-card">
          <div class="stat-number" id="totalCount">-</div>
          <div class="stat-label" data-admin-i18n="dashboard.totalFriends">Total Friends</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="activeCoupons">-</div>
          <div class="stat-label" data-admin-i18n="dashboard.activeCoupons">Active Coupons</div>
        </div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;">
        <div class="lang-switch" id="dashLangSwitch">
          <button class="active" onclick="setAdminLang('en')">EN</button>
          <button onclick="setAdminLang('th')">TH</button>
        </div>
        <button class="logout-btn" onclick="logout()" data-admin-i18n="dashboard.logout">Logout</button>
      </div>
    </div>

    <div class="search-bar">
      <input type="text" id="searchInput" data-admin-i18n-placeholder="dashboard.search" placeholder="Search by name or member number..." oninput="filterFriends()">
    </div>

    <div class="action-bar">
      <button onclick="loadFriends()" data-admin-i18n="dashboard.refresh">Refresh</button>
      <button onclick="openBroadcastModal()" data-admin-i18n="dashboard.broadcast">Broadcast Message</button>
      <button onclick="openSelectedModal()" data-admin-i18n="dashboard.sendSelected" id="sendSelectedBtn" style="display:none;">Send to Selected (0)</button>
      <label style="display:flex;align-items:center;gap:6px;color:#888;font-size:13px;cursor:pointer;margin-left:auto;">
        <input type="checkbox" id="selectAllCheckbox" onchange="toggleSelectAll(this.checked)">
        <span data-admin-i18n="dashboard.selectAll">Select All</span>
      </label>
    </div>

    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th style="width:40px;"></th>
            <th></th>
            <th data-admin-i18n="table.memberNo">Member No.</th>
            <th data-admin-i18n="table.name">Name</th>
            <th data-admin-i18n="table.status">Status</th>
            <th data-admin-i18n="table.coupon">Coupon</th>
            <th data-admin-i18n="table.validPeriod">Valid Period</th>
            <th data-admin-i18n="table.registered">Registered</th>
            <th data-admin-i18n="table.action">Action</th>
          </tr>
        </thead>
        <tbody id="friendsTable">
          <tr><td colspan="9" class="loading">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- 送信モーダル -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h2 id="modalTitle" data-admin-i18n="modal.sendTitle">Send Message</h2>
      <p id="modalDesc" data-admin-i18n="modal.sendDesc">Send a message to all friends</p>
      <textarea id="messageInput" data-admin-i18n-placeholder="modal.placeholder" placeholder="Enter your message here..."></textarea>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()" data-admin-i18n="modal.cancel">Cancel</button>
        <button class="btn-send" id="sendBtn" onclick="sendMessage()" data-admin-i18n="modal.send">Send</button>
      </div>
    </div>
  </div>

  <!-- お客様カルテ -->
  <div class="customer-detail" id="customerDetail">
    <div class="detail-container">
      <div class="detail-header">
        <img class="detail-avatar" id="detailAvatar" src="" alt="">
        <div class="detail-info">
          <h2 id="detailName"></h2>
          <p id="detailMember"></p>
        </div>
        <button class="detail-close" onclick="closeCustomerDetail()" data-admin-i18n="detail.close">Close</button>
      </div>

      <!-- カルテ追加フォーム -->
      <div class="note-form">
        <h3 data-admin-i18n="detail.addNote">Add Visit Record</h3>
        <div class="form-row">
          <div class="form-group">
            <label data-admin-i18n="detail.date">Date</label>
            <input type="date" id="noteDate">
          </div>
          <div class="form-group">
            <label data-admin-i18n="detail.stylist">Stylist</label>
            <select id="noteStylist">
              <option value="Laphit">Laphit</option>
              <option value="Aoy">Aoy</option>
              <option value="Ploy">Ploy</option>
              <option value="Tuk">Tuk</option>
            </select>
          </div>
          <div class="form-group">
            <label data-admin-i18n="detail.service">Service</label>
            <input type="text" id="noteService" data-admin-i18n-placeholder="detail.servicePlaceholder" placeholder="e.g. Cut, Color #7N, Perm">
          </div>
        </div>
        <div class="form-group" style="margin-bottom:12px;">
          <label data-admin-i18n="detail.comment">Comment</label>
          <textarea id="noteComment" data-admin-i18n-placeholder="detail.commentPlaceholder" placeholder="Hair type, preferences, notes for next visit..."></textarea>
        </div>
        <div class="photo-upload">
          <label for="notePhoto" data-admin-i18n="detail.uploadPhoto">Upload Photo</label>
          <input type="file" id="notePhoto" accept="image/*" style="display:none" onchange="previewPhoto(this)">
          <img class="photo-preview" id="photoPreview">
          <span id="photoFileName" style="color:#888;font-size:12px;"></span>
        </div>
        <button class="btn-add-note" onclick="addNote()" data-admin-i18n="detail.save">Save</button>
      </div>

      <!-- 施術履歴一覧 -->
      <div class="notes-list">
        <h3 data-admin-i18n="detail.history">Visit History</h3>
        <div id="notesList">
          <p class="note-empty" data-admin-i18n="detail.noRecords">No records yet</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    let adminPassword = "";
    let friendsData = [];
    let sendTarget = null; // null = broadcast, userId = individual
    let adminLang = "en";

    // 管理画面の翻訳データ

    // 翻訳テキスト取得
    function t(key) {
      return adminTranslations[adminLang][key] || adminTranslations["en"][key] || key;
    }

    // 言語切替
    function setAdminLang(lang) {
      adminLang = lang;
      // ボタンのactive状態を更新
      document.querySelectorAll(".lang-switch button").forEach(btn => {
        btn.classList.toggle("active", btn.textContent === lang.toUpperCase());
      });
      // テキスト更新
      document.querySelectorAll("[data-admin-i18n]").forEach(el => {
        const key = el.getAttribute("data-admin-i18n");
        el.textContent = t(key);
      });
      document.querySelectorAll("[data-admin-i18n-placeholder]").forEach(el => {
        const key = el.getAttribute("data-admin-i18n-placeholder");
        el.placeholder = t(key);
      });
      // テーブル再描画
      if (friendsData.length > 0) {
        renderFriends(friendsData);
      }
    }

    // ログイン処理
    async function login() {
      const pw = document.getElementById("passwordInput").value;
      if (!pw) return;

      try {
        const res = await fetch("/api/friends", {
          headers: { "x-admin-password": pw }
        });

        if (res.ok) {
          adminPassword = pw;
          document.getElementById("loginScreen").classList.add("hidden");
          document.getElementById("dashboard").classList.add("active");
          const data = await res.json();
          friendsData = data;
          renderFriends(data);
        } else {
          document.getElementById("loginError").style.display = "block";
        }
      } catch (e) {
        document.getElementById("loginError").style.display = "block";
      }
    }

    // ログアウト
    function logout() {
      adminPassword = "";
      document.getElementById("loginScreen").classList.remove("hidden");
      document.getElementById("dashboard").classList.remove("active");
      document.getElementById("passwordInput").value = "";
      document.getElementById("loginError").style.display = "none";
    }

    // 友だち一覧を読み込み
    async function loadFriends() {
      try {
        const res = await fetch("/api/friends", {
          headers: { "x-admin-password": adminPassword }
        });
        if (res.ok) {
          const data = await res.json();
          friendsData = data;
          renderFriends(data);
        }
      } catch (e) {
        console.error("Load error:", e);
      }
    }

    // テーブル描画
    function renderFriends(friends) {
      const tbody = document.getElementById("friendsTable");
      const now = new Date();
      let activeCount = 0;

      if (!friends || friends.length === 0) {
        tbody.innerHTML = `<tr><td colspan="9" class="empty-state">${t("table.empty")}</td></tr>`;
        document.getElementById("totalCount").textContent = "0";
        document.getElementById("activeCoupons").textContent = "0";
        return;
      }

      document.getElementById("totalCount").textContent = friends.length;

      tbody.innerHTML = friends.map(f => {
        // クーポン状態の判定
        const start = new Date(f.coupon_start);
        const end = new Date(f.coupon_end);
        let couponStatus = "";
        let couponClass = "";

        if (now < start) {
          couponStatus = t("coupon.upcoming");
          couponClass = "coupon-upcoming";
        } else if (now >= start && now <= end) {
          couponStatus = t("coupon.active");
          couponClass = "coupon-valid";
          activeCount++;
        } else {
          couponStatus = t("coupon.expired");
          couponClass = "coupon-expired";
        }

        // 日付フォーマット
        const regDate = new Date(f.registered_at).toLocaleDateString("ja-JP");

        // アバター
        const avatar = f.picture_url
          ? `<img class="avatar" src="${f.picture_url}" alt="${f.display_name}">`
          : `<div class="avatar-placeholder">?</div>`;

        return `<tr id="row-${f.user_id}">
          <td><input type="checkbox" class="friend-checkbox" value="${f.user_id}" data-name="${f.display_name}" onchange="updateSelectedCount()"></td>
          <td>${avatar}</td>
          <td><span class="coupon-code">${f.member_number || "-"}</span></td>
          <td><a href="#" onclick="openCustomerDetail('${f.user_id}');return false;" style="color:#d4a853;text-decoration:none;"><strong>${f.display_name || "Unknown"}</strong></a></td>
          <td>${f.status_message || "-"}</td>
          <td><span class="coupon-code">${f.coupon_code}</span> <span class="${couponClass}">${couponStatus}</span></td>
          <td>${f.coupon_start} ~ ${f.coupon_end}</td>
          <td>${regDate}</td>
          <td><button class="send-btn" onclick="openSendModal('${f.user_id}', '${f.display_name}')">${t("btn.send")}</button></td>
        </tr>`;
      }).join("");

      document.getElementById("activeCoupons").textContent = activeCount;
    }

    // チェックボックス：選択数を更新
    function updateSelectedCount() {
      const checked = document.querySelectorAll(".friend-checkbox:checked");
      const btn = document.getElementById("sendSelectedBtn");
      if (checked.length > 0) {
        btn.style.display = "inline-block";
        btn.textContent = `${t("dashboard.sendSelected")} (${checked.length})`;
      } else {
        btn.style.display = "none";
      }
      // 行のハイライト
      document.querySelectorAll(".friend-checkbox").forEach(cb => {
        const row = cb.closest("tr");
        row.classList.toggle("selected", cb.checked);
      });
      // Select Allチェックボックスの状態を同期
      const allCheckboxes = document.querySelectorAll(".friend-checkbox");
      document.getElementById("selectAllCheckbox").checked =
        allCheckboxes.length > 0 && checked.length === allCheckboxes.length;
    }

    // 全選択/全解除
    function toggleSelectAll(checked) {
      document.querySelectorAll(".friend-checkbox").forEach(cb => {
        cb.checked = checked;
      });
      updateSelectedCount();
    }

    // 選択者へ送信モーダル
    function openSelectedModal() {
      const checked = document.querySelectorAll(".friend-checkbox:checked");
      if (checked.length === 0) return;
      sendTarget = "selected";
      document.getElementById("modalTitle").textContent = t("modal.selectedTitle");
      document.getElementById("modalDesc").textContent = t("modal.selectedDesc").replace("{count}", checked.length);
      document.getElementById("messageInput").value = "";
      document.getElementById("modalOverlay").classList.add("active");
    }

    // 個別送信モーダル
    function openSendModal(userId, name) {
      sendTarget = userId;
      document.getElementById("modalTitle").textContent = `${t("modal.sendToTitle")} ${name}`;
      document.getElementById("modalDesc").textContent = `${t("modal.sendToDesc")} ${name}`;
      document.getElementById("messageInput").value = "";
      document.getElementById("modalOverlay").classList.add("active");
    }

    // 一斉送信モーダル
    function openBroadcastModal() {
      sendTarget = null;
      document.getElementById("modalTitle").textContent = t("modal.sendTitle");
      document.getElementById("modalDesc").textContent = `${t("modal.sendDesc")} (${friendsData.length})`;
      document.getElementById("messageInput").value = "";
      document.getElementById("modalOverlay").classList.add("active");
    }

    // モーダルを閉じる
    function closeModal() {
      document.getElementById("modalOverlay").classList.remove("active");
    }

    // メッセージ送信
    async function sendMessage() {
      const message = document.getElementById("messageInput").value.trim();
      if (!message) return;

      const btn = document.getElementById("sendBtn");
      btn.textContent = t("modal.sending");
      btn.disabled = true;

      try {
        if (sendTarget === "selected") {
          // 選択者へ送信
          const checked = document.querySelectorAll(".friend-checkbox:checked");
          let sent = 0;
          for (const cb of checked) {
            try {
              await fetch("/api/friends", {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                  "x-admin-password": adminPassword
                },
                body: JSON.stringify({ userId: cb.value, message })
              });
              sent++;
            } catch (e) {
              console.error("Failed to send to:", cb.dataset.name);
            }
          }
          alert(t("modal.broadcastResult").replace("{sent}", sent).replace("{total}", checked.length));
        } else if (sendTarget) {
          // 個別送信
          await fetch("/api/friends", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "x-admin-password": adminPassword
            },
            body: JSON.stringify({ userId: sendTarget, message })
          });
          alert(t("modal.sent"));
        } else {
          // 一斉送信
          let sent = 0;
          for (const f of friendsData) {
            try {
              await fetch("/api/friends", {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                  "x-admin-password": adminPassword
                },
                body: JSON.stringify({ userId: f.user_id, message })
              });
              sent++;
            } catch (e) {
              console.error("Failed to send to:", f.display_name);
            }
          }
          alert(t("modal.broadcastResult").replace("{sent}", sent).replace("{total}", friendsData.length));
        }
      } catch (e) {
        alert(t("modal.error"));
      }

      btn.textContent = t("modal.send");
      btn.disabled = false;
      closeModal();
    }

    // ========== 検索フィルター ==========
    function filterFriends() {
      const query = document.getElementById("searchInput").value.toLowerCase().trim();
      if (!query) {
        renderFriends(friendsData);
        return;
      }
      const filtered = friendsData.filter(f =>
        (f.display_name || "").toLowerCase().includes(query) ||
        (f.member_number || "").toLowerCase().includes(query) ||
        (f.coupon_code || "").toLowerCase().includes(query)
      );
      renderFriends(filtered);
    }

    // ========== お客様カルテ機能 ==========
    let currentDetailUserId = null;

    // カルテ画面を開く
    function openCustomerDetail(userId) {
      const friend = friendsData.find(f => f.user_id === userId);
      if (!friend) return;

      currentDetailUserId = userId;

      // ヘッダー情報をセット
      const avatar = document.getElementById("detailAvatar");
      if (friend.picture_url) {
        avatar.src = friend.picture_url;
        avatar.style.display = "block";
      } else {
        avatar.style.display = "none";
      }
      document.getElementById("detailName").textContent = friend.display_name || "Unknown";
      document.getElementById("detailMember").textContent = friend.member_number || "";

      // フォームをリセット
      document.getElementById("noteDate").value = new Date().toISOString().split("T")[0];
      document.getElementById("noteStylist").selectedIndex = 0;
      document.getElementById("noteService").value = "";
      document.getElementById("noteComment").value = "";
      document.getElementById("notePhoto").value = "";
      document.getElementById("photoPreview").style.display = "none";
      document.getElementById("photoFileName").textContent = "";

      // モーダルを表示
      document.getElementById("customerDetail").classList.add("active");

      // 施術履歴を読み込み
      loadNotes(userId);
    }

    // カルテ画面を閉じる
    function closeCustomerDetail() {
      document.getElementById("customerDetail").classList.remove("active");
      currentDetailUserId = null;
    }

    // 写真プレビュー
    function previewPhoto(input) {
      const preview = document.getElementById("photoPreview");
      const fileName = document.getElementById("photoFileName");

      if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = function(e) {
          preview.src = e.target.result;
          preview.style.display = "block";
        };
        reader.readAsDataURL(input.files[0]);
        fileName.textContent = input.files[0].name;
      } else {
        preview.style.display = "none";
        fileName.textContent = "";
      }
    }

    // 写真をリサイズ・圧縮する（Vercelの4.5MBボディ制限対策）
    function resizeImage(file, maxWidth = 1200, quality = 0.7) {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = function(e) {
          const img = new Image();
          img.onload = function() {
            const canvas = document.createElement("canvas");
            let w = img.width;
            let h = img.height;
            // 最大幅を超える場合はリサイズ
            if (w > maxWidth) {
              h = Math.round(h * maxWidth / w);
              w = maxWidth;
            }
            canvas.width = w;
            canvas.height = h;
            const ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0, w, h);
            // JPEG形式で圧縮
            const dataUrl = canvas.toDataURL("image/jpeg", quality);
            console.log("Resized photo size:", Math.round(dataUrl.length / 1024), "KB");
            resolve(dataUrl);
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    }

    // 施術履歴を追加
    async function addNote() {
      if (!currentDetailUserId) return;

      const visitDate = document.getElementById("noteDate").value;
      const stylist = document.getElementById("noteStylist").value;
      const service = document.getElementById("noteService").value.trim();
      const note = document.getElementById("noteComment").value.trim();
      const photoInput = document.getElementById("notePhoto");

      if (!stylist) return;

      // 写真をリサイズ・圧縮してBase64に変換
      let photoData = "";
      if (photoInput.files && photoInput.files[0]) {
        console.log("Original photo size:", Math.round(photoInput.files[0].size / 1024), "KB");
        photoData = await resizeImage(photoInput.files[0]);
      }

      // 保存ボタンを無効化
      const btn = document.querySelector(".btn-add-note");
      btn.textContent = t("detail.saving");
      btn.disabled = true;

      try {
        const bodyData = JSON.stringify({
          userId: currentDetailUserId,
          stylist,
          service,
          note,
          visitDate,
          photoData
        });
        console.log("Request body size:", Math.round(bodyData.length / 1024), "KB");

        const res = await fetch("/api/notes", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-admin-password": adminPassword
          },
          body: bodyData
        });

        const result = await res.json();
        console.log("API response:", result);

        if (res.ok) {
          btn.textContent = t("detail.saved");
          // フォームをリセット
          document.getElementById("noteService").value = "";
          document.getElementById("noteComment").value = "";
          document.getElementById("notePhoto").value = "";
          document.getElementById("photoPreview").style.display = "none";
          document.getElementById("photoFileName").textContent = "";
          // 履歴を再読み込み
          await loadNotes(currentDetailUserId);
        } else {
          console.error("API error:", result);
          alert(t("modal.error"));
        }
      } catch (e) {
        console.error("Add note error:", e);
        alert(t("modal.error"));
      }

      setTimeout(() => {
        btn.textContent = t("detail.save");
        btn.disabled = false;
      }, 1500);
    }

    // 施術履歴を取得
    async function loadNotes(userId) {
      const container = document.getElementById("notesList");
      container.innerHTML = `<p class="note-empty">${t("table.loading")}</p>`;

      try {
        const res = await fetch(`/api/notes?userId=${userId}`, {
          headers: { "x-admin-password": adminPassword }
        });
        if (res.ok) {
          const notes = await res.json();
          renderNotes(notes);
        } else {
          container.innerHTML = `<p class="note-empty">${t("modal.error")}</p>`;
        }
      } catch (e) {
        console.error("Load notes error:", e);
        container.innerHTML = `<p class="note-empty">${t("modal.error")}</p>`;
      }
    }

    // 施術履歴を描画
    function renderNotes(notes) {
      const container = document.getElementById("notesList");

      if (!notes || notes.length === 0) {
        container.innerHTML = `<p class="note-empty">${t("detail.noRecords")}</p>`;
        return;
      }

      container.innerHTML = notes.map(n => {
        const photoHtml = n.photo_url
          ? `<img class="note-photo" src="${n.photo_url}" alt="photo" onclick="window.open('${n.photo_url}','_blank')">`
          : "";

        return `<div class="note-card">
          <div class="note-card-header">
            <span class="note-date">📅 ${n.visit_date || ""}</span>
            <span class="note-stylist">✂️ ${n.stylist || ""}</span>
            <button class="note-delete" onclick="deleteNote(${n.id})">🗑 Delete</button>
          </div>
          ${n.service ? `<div class="note-service">💇 ${n.service}</div>` : ""}
          ${n.note ? `<div class="note-text">${n.note}</div>` : ""}
          ${photoHtml}
        </div>`;
      }).join("");
    }

    // 施術履歴を削除
    async function deleteNote(noteId) {
      if (!confirm(t("detail.deleteConfirm"))) return;

      try {
        const res = await fetch(`/api/notes?id=${noteId}`, {
          method: "DELETE",
          headers: { "x-admin-password": adminPassword }
        });
        if (res.ok && currentDetailUserId) {
          await loadNotes(currentDetailUserId);
        }
      } catch (e) {
        console.error("Delete note error:", e);
      }
    }
  </script>
