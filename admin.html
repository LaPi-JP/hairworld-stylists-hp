<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hairworld Stylists - Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', 'Noto Sans JP', sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
    }

    /* ログイン画面 */
    .login-screen {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .login-box {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 40px;
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    .login-box h1 {
      color: #d4a853;
      font-size: 20px;
      margin-bottom: 8px;
    }
    .login-box p {
      color: #888;
      font-size: 14px;
      margin-bottom: 24px;
    }
    .login-box input {
      width: 100%;
      padding: 12px 16px;
      background: #0a0a0a;
      border: 1px solid #333;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      margin-bottom: 16px;
    }
    .login-box button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #d4a853, #c9a84c);
      border: none;
      border-radius: 8px;
      color: #000;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
    }
    .login-box button:hover { opacity: 0.9; }
    .login-error {
      color: #ff6b6b;
      font-size: 13px;
      margin-top: 12px;
      display: none;
    }

    /* ダッシュボード */
    .dashboard { display: none; padding: 20px; max-width: 1200px; margin: 0 auto; }
    .dashboard.active { display: block; }
    .login-screen.hidden { display: none; }

    .header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .header-bar h1 {
      color: #d4a853;
      font-size: 22px;
    }
    .header-bar .stats {
      display: flex;
      gap: 20px;
    }
    .stat-card {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 12px 20px;
      text-align: center;
    }
    .stat-number {
      font-size: 28px;
      font-weight: 700;
      color: #d4a853;
    }
    .stat-label {
      font-size: 12px;
      color: #888;
      margin-top: 4px;
    }
    .logout-btn {
      background: none;
      border: 1px solid #555;
      color: #888;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }
    .logout-btn:hover { border-color: #ff6b6b; color: #ff6b6b; }

    /* 言語切替ボタン */
    .lang-switch {
      display: flex;
      gap: 6px;
    }
    .lang-switch button {
      padding: 6px 14px;
      background: none;
      border: 1px solid #555;
      color: #888;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
    }
    .lang-switch button.active {
      border-color: #d4a853;
      color: #d4a853;
      background: rgba(212, 168, 83, 0.1);
    }

    /* アクションバー */
    .action-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .action-bar button {
      padding: 10px 20px;
      background: #1a1a1a;
      border: 1px solid #d4a853;
      color: #d4a853;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
    }
    .action-bar button:hover { background: #d4a853; color: #000; }

    /* テーブル */
    .table-container {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 12px;
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 800px;
    }
    th {
      background: #222;
      color: #d4a853;
      padding: 14px 16px;
      text-align: left;
      font-size: 13px;
      font-weight: 600;
      border-bottom: 1px solid #333;
    }
    td {
      padding: 12px 16px;
      border-bottom: 1px solid #222;
      font-size: 13px;
      vertical-align: middle;
    }
    tr:hover { background: #222; }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #d4a853;
    }
    .avatar-placeholder {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #888;
      font-size: 14px;
    }
    .coupon-code {
      background: #2a2a1a;
      color: #d4a853;
      padding: 4px 8px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 12px;
    }
    .coupon-valid { color: #4ecdc4; }
    .coupon-expired { color: #ff6b6b; }
    .coupon-upcoming { color: #ffd93d; }

    .send-btn {
      padding: 6px 12px;
      background: none;
      border: 1px solid #4ecdc4;
      color: #4ecdc4;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
    }
    .send-btn:hover { background: #4ecdc4; color: #000; }

    /* 一斉送信モーダル */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.7);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 30px;
      max-width: 500px;
      width: 90%;
    }
    .modal h2 {
      color: #d4a853;
      font-size: 18px;
      margin-bottom: 8px;
    }
    .modal p {
      color: #888;
      font-size: 13px;
      margin-bottom: 16px;
    }
    .modal textarea {
      width: 100%;
      height: 120px;
      background: #0a0a0a;
      border: 1px solid #333;
      border-radius: 8px;
      color: #fff;
      padding: 12px;
      font-size: 14px;
      resize: vertical;
      margin-bottom: 16px;
    }
    .modal-actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }
    .modal-actions button {
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 13px;
    }
    .btn-cancel { background: #333; color: #fff; }
    .btn-send { background: #d4a853; color: #000; font-weight: 600; }
    .btn-send:hover { opacity: 0.9; }

    .loading { text-align: center; padding: 40px; color: #888; }
    .empty-state { text-align: center; padding: 40px; color: #666; }

    @media (max-width: 768px) {
      .header-bar { flex-direction: column; align-items: flex-start; }
      .header-bar .stats { width: 100%; }
      .stat-card { flex: 1; }
    }
  </style>
</head>
<body>

  <!-- ログイン画面 -->
  <div class="login-screen" id="loginScreen">
    <div class="login-box">
      <div class="lang-switch" style="justify-content:center;margin-bottom:16px;">
        <button class="active" onclick="setAdminLang('en')">EN</button>
        <button onclick="setAdminLang('th')">TH</button>
      </div>
      <h1>Hairworld Stylists</h1>
      <p data-admin-i18n="login.subtitle">Admin Dashboard</p>
      <input type="password" id="passwordInput" data-admin-i18n-placeholder="login.placeholder" placeholder="Enter admin password" onkeydown="if(event.key==='Enter')login()">
      <button onclick="login()" data-admin-i18n="login.button">Login</button>
      <p class="login-error" id="loginError" data-admin-i18n="login.error">Invalid password</p>
    </div>
  </div>

  <!-- ダッシュボード -->
  <div class="dashboard" id="dashboard">
    <div class="header-bar">
      <h1 data-admin-i18n="dashboard.title">LINE Friends Dashboard</h1>
      <div class="stats">
        <div class="stat-card">
          <div class="stat-number" id="totalCount">-</div>
          <div class="stat-label" data-admin-i18n="dashboard.totalFriends">Total Friends</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="activeCoupons">-</div>
          <div class="stat-label" data-admin-i18n="dashboard.activeCoupons">Active Coupons</div>
        </div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;">
        <div class="lang-switch" id="dashLangSwitch">
          <button class="active" onclick="setAdminLang('en')">EN</button>
          <button onclick="setAdminLang('th')">TH</button>
        </div>
        <button class="logout-btn" onclick="logout()" data-admin-i18n="dashboard.logout">Logout</button>
      </div>
    </div>

    <div class="action-bar">
      <button onclick="loadFriends()" data-admin-i18n="dashboard.refresh">Refresh</button>
      <button onclick="openBroadcastModal()" data-admin-i18n="dashboard.broadcast">Broadcast Message</button>
    </div>

    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th></th>
            <th data-admin-i18n="table.name">Name</th>
            <th data-admin-i18n="table.status">Status</th>
            <th data-admin-i18n="table.coupon">Coupon</th>
            <th data-admin-i18n="table.validPeriod">Valid Period</th>
            <th data-admin-i18n="table.registered">Registered</th>
            <th data-admin-i18n="table.action">Action</th>
          </tr>
        </thead>
        <tbody id="friendsTable">
          <tr><td colspan="7" class="loading">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- 送信モーダル -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h2 id="modalTitle" data-admin-i18n="modal.sendTitle">Send Message</h2>
      <p id="modalDesc" data-admin-i18n="modal.sendDesc">Send a message to all friends</p>
      <textarea id="messageInput" data-admin-i18n-placeholder="modal.placeholder" placeholder="Enter your message here..."></textarea>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()" data-admin-i18n="modal.cancel">Cancel</button>
        <button class="btn-send" id="sendBtn" onclick="sendMessage()" data-admin-i18n="modal.send">Send</button>
      </div>
    </div>
  </div>

  <script>
    let adminPassword = "";
    let friendsData = [];
    let sendTarget = null; // null = broadcast, userId = individual
    let adminLang = "en";

    // 管理画面の翻訳データ
    const adminTranslations = {
      en: {
        "login.subtitle": "Admin Dashboard",
        "login.placeholder": "Enter admin password",
        "login.button": "Login",
        "login.error": "Invalid password",
        "dashboard.title": "LINE Friends Dashboard",
        "dashboard.totalFriends": "Total Friends",
        "dashboard.activeCoupons": "Active Coupons",
        "dashboard.logout": "Logout",
        "dashboard.refresh": "Refresh",
        "dashboard.broadcast": "Broadcast Message",
        "table.name": "Name",
        "table.status": "Status",
        "table.coupon": "Coupon",
        "table.validPeriod": "Valid Period",
        "table.registered": "Registered",
        "table.action": "Action",
        "table.empty": "No friends registered yet",
        "table.loading": "Loading...",
        "coupon.upcoming": "Upcoming",
        "coupon.active": "Active",
        "coupon.expired": "Expired",
        "modal.sendTitle": "Send Message",
        "modal.sendDesc": "Send a message to all friends",
        "modal.sendToTitle": "Send to",
        "modal.sendToDesc": "Send a direct message to",
        "modal.placeholder": "Enter your message here...",
        "modal.cancel": "Cancel",
        "modal.send": "Send",
        "modal.sending": "Sending...",
        "modal.sent": "Message sent!",
        "modal.broadcastResult": "Message sent to {sent}/{total} friends!",
        "modal.error": "Error sending message",
        "btn.send": "Send"
      },
      th: {
        "login.subtitle": "แดชบอร์ดผู้ดูแลระบบ",
        "login.placeholder": "กรอกรหัสผ่านผู้ดูแล",
        "login.button": "เข้าสู่ระบบ",
        "login.error": "รหัสผ่านไม่ถูกต้อง",
        "dashboard.title": "แดชบอร์ดเพื่อน LINE",
        "dashboard.totalFriends": "เพื่อนทั้งหมด",
        "dashboard.activeCoupons": "คูปองที่ใช้ได้",
        "dashboard.logout": "ออกจากระบบ",
        "dashboard.refresh": "รีเฟรช",
        "dashboard.broadcast": "ส่งข้อความถึงทุกคน",
        "table.name": "ชื่อ",
        "table.status": "สถานะ",
        "table.coupon": "คูปอง",
        "table.validPeriod": "ระยะเวลาใช้ได้",
        "table.registered": "วันที่ลงทะเบียน",
        "table.action": "จัดการ",
        "table.empty": "ยังไม่มีเพื่อนที่ลงทะเบียน",
        "table.loading": "กำลังโหลด...",
        "coupon.upcoming": "รอใช้งาน",
        "coupon.active": "ใช้ได้",
        "coupon.expired": "หมดอายุ",
        "modal.sendTitle": "ส่งข้อความ",
        "modal.sendDesc": "ส่งข้อความถึงเพื่อนทุกคน",
        "modal.sendToTitle": "ส่งถึง",
        "modal.sendToDesc": "ส่งข้อความโดยตรงถึง",
        "modal.placeholder": "พิมพ์ข้อความที่นี่...",
        "modal.cancel": "ยกเลิก",
        "modal.send": "ส่ง",
        "modal.sending": "กำลังส่ง...",
        "modal.sent": "ส่งข้อความแล้ว!",
        "modal.broadcastResult": "ส่งข้อความถึง {sent}/{total} คนแล้ว!",
        "modal.error": "เกิดข้อผิดพลาดในการส่งข้อความ",
        "btn.send": "ส่ง"
      }
    };

    // 翻訳テキスト取得
    function t(key) {
      return adminTranslations[adminLang][key] || adminTranslations["en"][key] || key;
    }

    // 言語切替
    function setAdminLang(lang) {
      adminLang = lang;
      // ボタンのactive状態を更新
      document.querySelectorAll(".lang-switch button").forEach(btn => {
        btn.classList.toggle("active", btn.textContent === lang.toUpperCase());
      });
      // テキスト更新
      document.querySelectorAll("[data-admin-i18n]").forEach(el => {
        const key = el.getAttribute("data-admin-i18n");
        el.textContent = t(key);
      });
      document.querySelectorAll("[data-admin-i18n-placeholder]").forEach(el => {
        const key = el.getAttribute("data-admin-i18n-placeholder");
        el.placeholder = t(key);
      });
      // テーブル再描画
      if (friendsData.length > 0) {
        renderFriends(friendsData);
      }
    }

    // ログイン処理
    async function login() {
      const pw = document.getElementById("passwordInput").value;
      if (!pw) return;

      try {
        const res = await fetch("/api/friends", {
          headers: { "x-admin-password": pw }
        });

        if (res.ok) {
          adminPassword = pw;
          document.getElementById("loginScreen").classList.add("hidden");
          document.getElementById("dashboard").classList.add("active");
          const data = await res.json();
          friendsData = data;
          renderFriends(data);
        } else {
          document.getElementById("loginError").style.display = "block";
        }
      } catch (e) {
        document.getElementById("loginError").style.display = "block";
      }
    }

    // ログアウト
    function logout() {
      adminPassword = "";
      document.getElementById("loginScreen").classList.remove("hidden");
      document.getElementById("dashboard").classList.remove("active");
      document.getElementById("passwordInput").value = "";
      document.getElementById("loginError").style.display = "none";
    }

    // 友だち一覧を読み込み
    async function loadFriends() {
      try {
        const res = await fetch("/api/friends", {
          headers: { "x-admin-password": adminPassword }
        });
        if (res.ok) {
          const data = await res.json();
          friendsData = data;
          renderFriends(data);
        }
      } catch (e) {
        console.error("Load error:", e);
      }
    }

    // テーブル描画
    function renderFriends(friends) {
      const tbody = document.getElementById("friendsTable");
      const now = new Date();
      let activeCount = 0;

      if (!friends || friends.length === 0) {
        tbody.innerHTML = `<tr><td colspan="7" class="empty-state">${t("table.empty")}</td></tr>`;
        document.getElementById("totalCount").textContent = "0";
        document.getElementById("activeCoupons").textContent = "0";
        return;
      }

      document.getElementById("totalCount").textContent = friends.length;

      tbody.innerHTML = friends.map(f => {
        // クーポン状態の判定
        const start = new Date(f.coupon_start);
        const end = new Date(f.coupon_end);
        let couponStatus = "";
        let couponClass = "";

        if (now < start) {
          couponStatus = t("coupon.upcoming");
          couponClass = "coupon-upcoming";
        } else if (now >= start && now <= end) {
          couponStatus = t("coupon.active");
          couponClass = "coupon-valid";
          activeCount++;
        } else {
          couponStatus = t("coupon.expired");
          couponClass = "coupon-expired";
        }

        // 日付フォーマット
        const regDate = new Date(f.registered_at).toLocaleDateString("ja-JP");

        // アバター
        const avatar = f.picture_url
          ? `<img class="avatar" src="${f.picture_url}" alt="${f.display_name}">`
          : `<div class="avatar-placeholder">?</div>`;

        return `<tr>
          <td>${avatar}</td>
          <td><strong>${f.display_name || "Unknown"}</strong></td>
          <td>${f.status_message || "-"}</td>
          <td><span class="coupon-code">${f.coupon_code}</span> <span class="${couponClass}">${couponStatus}</span></td>
          <td>${f.coupon_start} ~ ${f.coupon_end}</td>
          <td>${regDate}</td>
          <td><button class="send-btn" onclick="openSendModal('${f.user_id}', '${f.display_name}')">${t("btn.send")}</button></td>
        </tr>`;
      }).join("");

      document.getElementById("activeCoupons").textContent = activeCount;
    }

    // 個別送信モーダル
    function openSendModal(userId, name) {
      sendTarget = userId;
      document.getElementById("modalTitle").textContent = `${t("modal.sendToTitle")} ${name}`;
      document.getElementById("modalDesc").textContent = `${t("modal.sendToDesc")} ${name}`;
      document.getElementById("messageInput").value = "";
      document.getElementById("modalOverlay").classList.add("active");
    }

    // 一斉送信モーダル
    function openBroadcastModal() {
      sendTarget = null;
      document.getElementById("modalTitle").textContent = t("modal.sendTitle");
      document.getElementById("modalDesc").textContent = `${t("modal.sendDesc")} (${friendsData.length})`;
      document.getElementById("messageInput").value = "";
      document.getElementById("modalOverlay").classList.add("active");
    }

    // モーダルを閉じる
    function closeModal() {
      document.getElementById("modalOverlay").classList.remove("active");
    }

    // メッセージ送信
    async function sendMessage() {
      const message = document.getElementById("messageInput").value.trim();
      if (!message) return;

      const btn = document.getElementById("sendBtn");
      btn.textContent = t("modal.sending");
      btn.disabled = true;

      try {
        if (sendTarget) {
          // 個別送信
          await fetch("/api/friends", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "x-admin-password": adminPassword
            },
            body: JSON.stringify({ userId: sendTarget, message })
          });
          alert(t("modal.sent"));
        } else {
          // 一斉送信
          let sent = 0;
          for (const f of friendsData) {
            try {
              await fetch("/api/friends", {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                  "x-admin-password": adminPassword
                },
                body: JSON.stringify({ userId: f.user_id, message })
              });
              sent++;
            } catch (e) {
              console.error("Failed to send to:", f.display_name);
            }
          }
          alert(t("modal.broadcastResult").replace("{sent}", sent).replace("{total}", friendsData.length));
        }
      } catch (e) {
        alert(t("modal.error"));
      }

      btn.textContent = t("modal.send");
      btn.disabled = false;
      closeModal();
    }
  </script>
</body>
</html>
